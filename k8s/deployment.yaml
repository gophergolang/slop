apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-task-saas
  labels:
    app: team-task-saas
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: team-task-saas
  template:
    metadata:
      labels:
        app: team-task-saas
    spec:
      serviceAccountName: team-task-saas
      containers:
        - name: app
          image: ghcr.io/vibeguard/team-task-saas:v1.0.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: team-task-saas-secrets
                  key: database-url
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: team-task-saas-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: team-task-saas
spec:
  selector:
    app: team-task-saas
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: team-task-saas
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: team-task-saas
spec:
  podSelector:
    matchLabels:
      app: team-task-saas
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432